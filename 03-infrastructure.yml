---
- name: Déploiement infrastructure WordPress sur Azure
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    rg_name: "wordpress-rg"
    location: "denmarkeast"
    vnet_name: "wordpress-vnet"
    admin_username: "azureuser"
    vm_size: "Standard_B1s"
    vm_image:
      offer: "0001-com-ubuntu-server-jammy"
      publisher: "Canonical"
      sku: "22_04-lts-gen2"
      version: "latest"
    mysql_server_name: "wordpress-mysql-flex"

  vars_files:
  - ../vars/secrets.yml

  tasks:

  # =============================================

  - name: Générer la clé SSH si elle n'existe pas
    community.crypto.openssh_keypair:
      path: "~/.ssh/id_rsa"
      type: rsa
      size: 4096

  - name: Lire la clé publique SSH
    slurp:
      src: "~/.ssh/id_rsa.pub"
    register: ssh_pub_key

  # =============================================
  - name: Créer le NSG jumpoff-nsg
    azure.azcollection.azure_rm_securitygroup:
      name: "jumpoff-nsg"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      rules:
        - name: "Allow-SSH-Inbound"
          priority: 100
          direction: Inbound
          access: Allow
          protocol: Tcp
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "22"
        - name: "Deny-All-Inbound"
          priority: 4096
          direction: Inbound
          access: Deny
          protocol: "*"
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "*"

  - name: Créer le NSG app-nsg
    azure.azcollection.azure_rm_securitygroup:
      name: "app-nsg"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      rules:
        - name: "Allow-HTTP-Inbound"
          priority: 100
          direction: Inbound
          access: Allow
          protocol: Tcp
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "80"
        - name: "Allow-HTTPS-Inbound"
          priority: 110
          direction: Inbound
          access: Allow
          protocol: Tcp
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "443"
        - name: "Allow-SSH-From-Jumpoff"
          priority: 120
          direction: Inbound
          access: Allow
          protocol: Tcp
          source_address_prefix: "10.0.0.0/28"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "22"
        - name: "Deny-All-Inbound"
          priority: 4096
          direction: Inbound
          access: Deny
          protocol: "*"
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "*"

  - name: Créer le NSG data-nsg
    azure.azcollection.azure_rm_securitygroup:
      name: "data-nsg"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      rules:
        - name: "Allow-MySQL-From-App"
          priority: 100
          direction: Inbound
          access: Allow
          protocol: Tcp
          source_address_prefix: "10.0.0.16/28"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "3306"
        - name: "Deny-All-Inbound"
          priority: 4096
          direction: Inbound
          access: Deny
          protocol: "*"
          source_address_prefix: "*"
          source_port_range: "*"
          destination_address_prefix: "*"
          destination_port_range: "*"

  # =============================================

  - name: Associer jumpoff-nsg au subnet-jumpoff
    azure.azcollection.azure_rm_subnet:
      name: "subnet-jumpoff"
      resource_group: "{{ rg_name }}"
      virtual_network_name: "{{ vnet_name }}"
      address_prefix_cidr: "10.0.0.0/28"
      security_group: "jumpoff-nsg"

  - name: Associer app-nsg au subnet-app
    azure.azcollection.azure_rm_subnet:
      name: "subnet-app"
      resource_group: "{{ rg_name }}"
      virtual_network_name: "{{ vnet_name }}"
      address_prefix_cidr: "10.0.0.16/28"
      security_group: "app-nsg"

  - name: Associer data-nsg au subnet-data
    azure.azcollection.azure_rm_subnet:
      name: "subnet-data"
      resource_group: "{{ rg_name }}"
      virtual_network_name: "{{ vnet_name }}"
      address_prefix_cidr: "10.0.0.32/28"
      security_group: "data-nsg"
      delegations:
        - name: "mysql-delegation"
          serviceName: "Microsoft.DBforMySQL/flexibleServers"



  # =============================================

  - name: Créer la NIC jumpoff-nic
    azure.azcollection.azure_rm_networkinterface:
      name: "jumpoff-nic"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      virtual_network: "{{ vnet_name }}"
      subnet_name: "subnet-jumpoff"
      ip_configurations:
      - name: "ipconfig1"
        primary: true
        public_ip_address_name: "jumpoff-pip"

  - name: Créer la NIC app-vm-1-nic
    azure.azcollection.azure_rm_networkinterface:
      name: "app-vm-1-nic"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      virtual_network: "{{ vnet_name }}"
      subnet_name: "subnet-app"
      ip_configurations:
      - name: "ipconfig1"
        primary: true

  - name: Créer la NIC app-vm-2-nic
    azure.azcollection.azure_rm_networkinterface:
      name: "app-vm-2-nic"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      virtual_network: "{{ vnet_name }}"
      subnet_name: "subnet-app"
      ip_configurations:
      - name: "ipconfig1"
        primary: true

  # =============================================

  - name: Créer la VM jumpoff
    azure.azcollection.azure_rm_virtualmachine:
      name: "jumpoff-vm"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      vm_size: "{{ vm_size }}"
      admin_username: "{{ admin_username }}"
      ssh_password_enabled: false
      ssh_public_keys:
      - path: "/home/{{ admin_username }}/.ssh/authorized_keys"
        key_data: "{{ ssh_pub_key.content | b64decode }}"
      network_interfaces:
      - "jumpoff-nic"
      image: "{{ vm_image }}"
      os_disk_size_gb: 30
      managed_disk_type: "Standard_LRS"

  # =============================================

  - name: Récupérer les infos du serveur MySQL
    azure.azcollection.azure_rm_mysqlflexibleserver_info:
      name: "{{ mysql_server_name }}"
      resource_group: "{{ rg_name }}"
    register: mysql_info

  - name: Définir le FQDN MySQL
    set_fact:
      mysql_server_fqdn: "{{ mysql_info.servers[0].fully_qualified_domain_name }}"

  # =============================================

  - name: Générer le cloud-init depuis le template
    template:
      src: "../files/cloud-init-app.yml.j2"
      dest: "/tmp/cloud-init-app.yml"
    changed_when: false

  - name: Lire le cloud-init généré
    slurp:
      src: "/tmp/cloud-init-app.yml"
    register: cloud_init_content

  # =============================================

  - name: Créer la VM app-vm-1
    azure.azcollection.azure_rm_virtualmachine:
      name: "app-vm-1"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      vm_size: "{{ vm_size }}"
      admin_username: "{{ admin_username }}"
      ssh_password_enabled: false
      ssh_public_keys:
      - path: "/home/{{ admin_username }}/.ssh/authorized_keys"
        key_data: "{{ ssh_pub_key.content | b64decode }}"
      network_interfaces:
      - "app-vm-1-nic"
      image: "{{ vm_image }}"
      os_disk_size_gb: 30
      managed_disk_type: "Standard_LRS"
      custom_data: "{{ cloud_init_content.content }}"

  - name: Créer la VM app-vm-2
    azure.azcollection.azure_rm_virtualmachine:
      name: "app-vm-2"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      vm_size: "{{ vm_size }}"
      admin_username: "{{ admin_username }}"
      ssh_password_enabled: false
      ssh_public_keys:
      - path: "/home/{{ admin_username }}/.ssh/authorized_keys"
        key_data: "{{ ssh_pub_key.content | b64decode }}"
      network_interfaces:
      - "app-vm-2-nic"
      image: "{{ vm_image }}"
      os_disk_size_gb: 30
      managed_disk_type: "Standard_LRS"
      custom_data: "{{ cloud_init_content.content }}"

  - name: Supprimer le fichier cloud-init temporaire
    file:
      path: "/tmp/cloud-init-app.yml"
      state: absent
    changed_when: false

  # =============================================

  - name: Créer le Load Balancer
    azure.azcollection.azure_rm_loadbalancer:
      name: "wordpress-lb"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      sku: "Standard"
      frontend_ip_configurations:
      - name: "lb-frontend"
        public_ip_address: "lb-pip"
      backend_address_pools:
      - name: "lb-backend-pool"
      probes:
      - name: "lb-health-probe"
        protocol: "Tcp"
        port: 80
        interval: 5
        fail_count: 2
      load_balancing_rules:
      - name: "lb-rule-http"
        frontend_ip_configuration: "lb-frontend"
        backend_address_pool: "lb-backend-pool"
        probe: "lb-health-probe"
        protocol: "Tcp"
        frontend_port: 80
        backend_port: 80
      - name: "lb-rule-https"
        frontend_ip_configuration: "lb-frontend"
        backend_address_pool: "lb-backend-pool"
        probe: "lb-health-probe"
        protocol: "Tcp"
        frontend_port: 443
        backend_port: 443

  # =============================================

  - name: Associer app-vm-1-nic au backend pool du LB
    azure.azcollection.azure_rm_networkinterface:
      name: "app-vm-1-nic"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      virtual_network: "{{ vnet_name }}"
      subnet_name: "subnet-app"
      ip_configurations:
      - name: "ipconfig1"
        primary: true
        load_balancer_backend_address_pools:
        - name: "lb-backend-pool"
          load_balancer: "wordpress-lb"

  - name: Associer app-vm-2-nic au backend pool du LB
    azure.azcollection.azure_rm_networkinterface:
      name: "app-vm-2-nic"
      resource_group: "{{ rg_name }}"
      location: "{{ location }}"
      virtual_network: "{{ vnet_name }}"
      subnet_name: "subnet-app"
      ip_configurations:
      - name: "ipconfig1"
        primary: true
        load_balancer_backend_address_pools:
        - name: "lb-backend-pool"
          load_balancer: "wordpress-lb"
